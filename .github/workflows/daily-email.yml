name: Daily Meditations Email

on:
  schedule:
    # Runs at 6:37 AM UTC daily (7:37 AM WAT / Lagos time)
    # Using an odd minute to avoid GitHub's peak scheduler load
    - cron: '47 9 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab for testing

permissions:
  contents: read

jobs:
  send-email:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily passage
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: python send_daily_email.py
